<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>MyHealthDB</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
</head>
<body>
  <header class="app-header">
    <div class="header-left">
      <div class="brand">MyHealthDB</div>
      <div class="subtitle" id="tab-subtitle">Dashboard</div>
    </div>
    <div class="date-badge" id="current-date"></div>
  </header>

  <div class="swipe-hint" id="swipe-hint">
    <div class="swipe-dot active"></div>
    <div class="swipe-dot"></div>
    <div class="swipe-dot"></div>
    <div class="swipe-dot"></div>
    <div class="swipe-dot"></div>
  </div>

  <main class="panels-wrap" id="panels-wrap">
    <div class="panels-slider" id="panels-slider">
      <section class="tab-panel" id="panel-dashboard"></section>
      <section class="tab-panel" id="panel-wellness"></section>
      <section class="tab-panel" id="panel-readiness"></section>
      <section class="tab-panel" id="panel-volume"></section>
      <section class="tab-panel" id="panel-load"></section>
    </div>
  </main>

  <div class="tt" id="tt"></div>
  <div id="vol-tt">
    <div class="vtt-date" id="vtt-date"></div>
    <div id="vtt-acts"></div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav" role="navigation" aria-label="Main navigation">
    <button class="nav-item active" data-tab="dashboard" aria-label="Dashboard">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      <span class="nav-label">Dashboard</span>
    </button>

    <button class="nav-item" data-tab="wellness" aria-label="Wellness">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      <span class="nav-label">Wellness</span>
    </button>

    <button class="nav-item" data-tab="readiness" aria-label="Readiness">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
        <polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
      <span class="nav-label">Readiness</span>
    </button>

    <button class="nav-item" data-tab="volume" aria-label="Volume">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <path d="M3 9h18M3 15h18M9 3v18M15 3v18"/>
      </svg>
      <span class="nav-label">Volume</span>
    </button>

    <button class="nav-item" data-tab="load" aria-label="Load">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      <span class="nav-label">Load</span>
    </button>
  </nav>

  <script type="module">
    import { state, fetchData, switchTab, initSwipe, localDate, scoreRow } from './shared.js';
    import { renderDashboard } from './tab-dashboard.js';

    // ── Wire up bottom nav ──────────────────────────────────
    const navItems = document.querySelectorAll('.nav-item');
    navItems.forEach(item => {
      item.addEventListener('click', () => switchTab(item.dataset.tab));
    });

    // ── Expose syncNavToTab globally so shared.js can call it ──
    window.syncNavToTab = function(tab) {
      navItems.forEach(n => n.classList.toggle('active', n.dataset.tab === tab));
    };

    async function init() {
      const d = new Date();
      document.getElementById('current-date').textContent = d.toLocaleDateString('en-GB', {
        weekday: 'short', day: 'numeric', month: 'short'
      });

      initSwipe();

      // Render dashboard immediately (no allRows needed — it fetches its own data)
      // Mark as rendered so switchTab doesn't re-render it
      state.dashboardRendered = true;
      renderDashboard();

      // Fetch wellness data in background for other tabs
      try {
        state.allRows = await fetchData();
        state.allRows.forEach(r => {
          r._score = scoreRow(r, state.allRows).composite;
        });
      } catch (e) {
        console.error('Wellness data fetch error:', e);
      }
    }

    init();
  </script>
</body>
</html>
