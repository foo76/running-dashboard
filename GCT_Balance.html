<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GCT Balance</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<style>
body{font-family:system-ui,sans-serif;background:#0f1117;color:#e2e8f0;margin:0;padding:20px}
h2{font-size:1.1rem;font-weight:600;color:#94a3b8;margin-bottom:4px}
.subtitle{font-size:0.8rem;color:#64748b;margin-bottom:20px}
.period-btn{background:#1e293b;border:1px solid #334155;color:#94a3b8;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:0.8rem;margin-right:6px;transition:all 0.2s}
.period-btn.active{background:#3b82f6;border-color:#3b82f6;color:white}
.period-btn:hover:not(.active){border-color:#64748b;color:#e2e8f0}
#chart{margin-top:20px}
.tooltip{position:absolute;pointer-events:none;background:#1e293b;border:1px solid #334155;border-radius:8px;padding:10px 14px;font-size:0.78rem;color:#e2e8f0;opacity:0;transition:opacity 0.15s;line-height:1.6}
.tooltip strong{color:#60a5fa}
</style>
</head>
<body>
<h2>Ground Contact Time Balance</h2>
<p class="subtitle">Left vs right foot % per run · centred on 50% symmetry</p>
<div id="controls">
  <button class="period-btn active" data-days="30">30 days</button>
  <button class="period-btn" data-days="90">3 months</button>
  <button class="period-btn" data-days="180">6 months</button>
  <button class="period-btn" data-days="365">12 months</button>
  <button class="period-btn" data-days="all">All</button>
</div>
<div id="chart"></div>
<div class="tooltip" id="tooltip"></div>
<script type="module" src="gct.js"></script>
</body>
</html>
